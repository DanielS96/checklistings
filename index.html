<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklistings</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#f8fafc;
  color:#111827;
}

.container{
  max-width:720px;
  margin:auto;
  padding:20px;
}

/* ANIMATION */
.fade{
  animation:fade .4s ease;
}
@keyframes fade{
  from{opacity:0; transform:translateY(10px)}
  to{opacity:1; transform:translateY(0)}
}

/* HEADER */
h1{margin-bottom:5px}
.subtitle{color:#6b7280;margin-bottom:20px}

/* CARD */
.card{
  background:#fff;
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
  cursor:pointer;
  transition:0.2s;
}
.card:hover{transform:translateY(-3px)}
.card:active{transform:scale(0.98)}

.card-title{font-weight:600}
.card-sub{font-size:13px;color:#6b7280;margin-top:4px}

/* PROGRESS */
.progress{
  height:6px;
  background:#e5e7eb;
  border-radius:999px;
  overflow:hidden;
  margin-top:10px;
}
.fill{
  height:100%;
  background:#6366f1;
  transition:.4s;
}

/* GLOBAL */
.global{
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:#fff;
}

/* BADGE */
.badge{
  display:inline-block;
  margin-top:10px;
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
}
.done{background:#dcfce7}
.inprogress{background:#fef3c7}

/* CHECKLIST */
.header{
  background:#fff;
  padding:16px;
  border-radius:16px;
  margin-bottom:12px;
}

details{
  background:#fff;
  border-radius:12px;
  margin-bottom:10px;
  border:1px solid #e5e7eb;
}
summary{
  padding:14px;
  cursor:pointer;
  font-weight:500;
}
.content{padding:14px}
.source{font-size:12px;color:#6b7280}

.tip{
  background:#eef2ff;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#6366f1;
  color:#fff;
  margin-top:10px;
}
</style>
</head>

<body>
<div class="container fade" id="app"></div>
<script type="module" src="./js/app.js"></script>
</body>
</html>

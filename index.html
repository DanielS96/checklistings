<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklistings</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{font-family:'Inter',sans-serif;margin:0;background:#f9fafb;color:#111}
.container{max-width:720px;margin:0 auto;padding:20px}

h1{font-size:28px;margin-bottom:10px}

/* category */
.category{margin-top:30px}
.category-title{font-size:20px;margin-bottom:10px}

/* card */
.card{
  background:#fff;
  border-radius:14px;
  padding:16px;
  margin-bottom:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
  cursor:pointer;
}

.progress{
  height:6px;
  background:#e5e7eb;
  border-radius:6px;
  overflow:hidden;
  margin-top:10px;
}
.progress div{
  height:100%;
  background:#6366f1;
}

/* checklist */
.checklist-item{
  background:#fff;
  border-radius:12px;
  margin-bottom:10px;
  padding:14px;
}

.checkbox{
  width:18px;height:18px;border:2px solid #6366f1;
  border-radius:4px;display:inline-block;margin-right:10px;
}
.checked{background:#6366f1}

/* quiz */
.question{
  background:#fff;
  border-radius:12px;
  padding:14px;
  margin-bottom:10px;
}

.answers label{
  display:block;
  padding:10px;
  border-radius:8px;
  margin-top:6px;
  background:#f3f4f6;
  cursor:pointer;
}

.answers input{display:none}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#6366f1;
  color:#fff;
  margin-top:10px;
}

.result{
  margin-top:15px;
  padding:12px;
  border-radius:10px;
  background:#eef2ff;
}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>
let data = [];
let state = JSON.parse(localStorage.getItem("progress")) || {};

fetch("index.json")
.then(r=>r.json())
.then(json=>{
  data = json;
  renderCategories();
});

function save(){
  localStorage.setItem("progress", JSON.stringify(state));
}

/* ===== GROUP BY CATEGORY ===== */
function groupByCategory(){
  const map = {};
  data.forEach(item=>{
    if(!map[item.category]) map[item.category] = [];
    map[item.category].push(item);
  });
  return map;
}

/* ===== RENDER ===== */
function renderCategories(){
  const app = document.getElementById("app");
  app.innerHTML = "<h1>Checklistings</h1>";

  const grouped = groupByCategory();

  Object.keys(grouped).forEach(cat=>{
    app.innerHTML += `<div class="category"><div class="category-title">${cat}</div></div>`;

    grouped[cat]
      .sort((a,b)=>getProgress(b.id)-getProgress(a.id))
      .forEach(item=>{
        const prog = getProgress(item.id);

        app.innerHTML += `
          <div class="card" onclick="openChecklist('${item.id}')">
            <b>${item.title}</b>
            <div>${item.description}</div>
            <div class="progress"><div style="width:${prog}%"></div></div>
            <small>${prog}%</small>
          </div>
        `;
      });
  });
}

/* ===== CHECKLIST ===== */
function openChecklist(id){
  const item = data.find(i=>i.id===id);
  if(!state[id]) state[id] = {checked:{}, quizScore:0};

  const app = document.getElementById("app");

  app.innerHTML = `
    <button onclick="renderCategories()">← Назад</button>
    <h1>${item.title}</h1>

    <div class="progress"><div style="width:${getProgress(id)}%" id="bar"></div></div>

    <div id="checklist"></div>

    <h2>Тест</h2>
    <div id="quiz"></div>
    <button onclick="checkQuiz('${id}')">Проверить</button>
    <div class="result" id="result"></div>
  `;

  const cl = document.getElementById("checklist");

  item.checklist.forEach((c,i)=>{
    const checked = state[id].checked[i];
    cl.innerHTML += `
      <div class="checklist-item" onclick="toggle('${id}',${i})">
        <span class="checkbox ${checked?'checked':''}"></span>
        ${c.title}
      </div>
    `;
  });

  const quiz = document.getElementById("quiz");

  item.quiz.forEach((q,i)=>{
    quiz.innerHTML += `
      <div class="question">
        ${i+1}. ${q.q}
        <div class="answers">
          ${q.a.map((a,ai)=>`
            <label>
              <input type="radio" name="q${i}" value="${ai}">
              ${a}
            </label>
          `).join("")}
        </div>
      </div>
    `;
  });

  window.currentQuiz = item.quiz;
}

/* ===== LOGIC ===== */
function toggle(id,i){
  state[id].checked[i] = !state[id].checked[i];
  save();
  openChecklist(id);
}

function checkQuiz(id){
  let score=0;

  currentQuiz.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    if(sel && Number(sel.value)===q.c) score++;
  });

  state[id].quizScore=score;
  save();

  document.getElementById("result").innerText = `Результат: ${score}/${currentQuiz.length}`;
  document.getElementById("bar").style.width = getProgress(id)+"%";
}

function getProgress(id){
  const item = data.find(i=>i.id===id);
  if(!state[id]) return 0;

  const checked = Object.values(state[id].checked).filter(v=>v).length;
  const cProg = checked/item.checklist.length;

  const qProg = state[id].quizScore/item.quiz.length;

  return Math.round((cProg*0.5 + qProg*0.5)*100);
}
</script>
</body>
</html>

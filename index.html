<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklistings</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{font-family:Inter;background:#f8fafc;margin:0}
.container{max-width:720px;margin:0 auto;padding:20px}

.card{
  background:#fff;
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.05)
}

.status{
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  display:inline-block;
  margin-top:10px;
}
.status.progress{background:#fef3c7}
.status.done{background:#dcfce7}

details{
  border:1px solid #e5e7eb;
  border-radius:10px;
  margin-top:8px;
}

summary{
  padding:12px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}

.content{padding:12px}

.tip{
  background:#eef2ff;
  padding:8px;
  border-radius:6px;
  margin-top:6px
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  background:#6366f1;
  color:#fff;
}
</style>
</head>

<body>
<div class="container" id="app">Загрузка...</div>

<script>

async function loadData(){
  try{
    const res = await fetch('checklist.json') // ВАЖНО
    const data = await res.json()
    render(data)
  }catch(e){
    document.getElementById('app').innerHTML = 'Ошибка загрузки JSON'
    console.error(e)
  }
}

function render(data){
  const app = document.getElementById('app')
  const done = localStorage.getItem(data.title) === 'done'

  app.innerHTML = `
    <div class="card">
      <h2>${data.title}</h2>
      <div>${data.subtitle}</div>
      <p>${data.description}</p>
      <div class="status ${done?'done':'progress'}">
        ${done?'Выполнено':'В процессе'}
      </div>
    </div>

    ${data.items.map(i=>`
      <details>
        <summary>${i.emoji} ${i.title}</summary>
        <div class="content">
          <div><b>${i.source}</b></div>
          <div>${i.text}</div>
          <div class="tip">${i.tip}</div>
        </div>
      </details>
    `).join('')}

    <div class="card">
      <h3>Тест</h3>

      ${data.quiz.map((q,qi)=>`
        <div>
          <p>${q.q}</p>
          ${q.a.map((a,ai)=>`
            <label>
              <input type="radio" name="q${qi}" value="${ai}"> ${a}
            </label><br>
          `).join('')}
        </div>
      `).join('')}

      <button onclick="checkQuiz()">Проверить</button>
      <button id="finish" style="display:none;background:#22c55e" onclick="finish('${data.title}')">
        Завершить
      </button>
    </div>
  `
}

function checkQuiz(){
  document.getElementById('finish').style.display='block'
}

function finish(title){
  localStorage.setItem(title,'done')
  location.reload()
}

loadData()

</script>
</body>
</html>

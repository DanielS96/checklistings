<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checklistings</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:Inter;
  background:#f8fafc;
  margin:0;
}

.container{
  max-width:720px;
  margin:0 auto;
  padding:20px;
}

/* HEADER */
h1{margin-bottom:10px}

/* CARD */
.card{
  background:#fff;
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 8px 24px rgba(0,0,0,0.06);
  cursor:pointer;
  transition:0.2s;
}
.card:hover{transform:scale(1.02)}

/* STATUS */
.status{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
}
.progress{background:#fef3c7}
.done{background:#dcfce7}

/* CHECKLIST */
details{
  background:#fff;
  border-radius:12px;
  margin-top:10px;
  border:1px solid #e5e7eb;
}
summary{
  padding:14px;
  cursor:pointer;
  font-weight:500;
}
.content{padding:14px}
.source{font-size:12px;color:#6b7280}
.tip{
  background:#eef2ff;
  padding:10px;
  border-radius:8px;
  margin-top:8px;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  background:#6366f1;
  color:#fff;
}
</style>
</head>

<body>
<div class="container" id="app">Загрузка...</div>

<script>

let categories = []
let currentCategory = null
let currentChecklist = null

/* ---------- LOAD ---------- */

async function loadCategories(){
  const res = await fetch('./data/categories.json?v='+Date.now())
  categories = await res.json()
  renderCategories()
}

/* ---------- SCREENS ---------- */

function renderCategories(){
  const app = document.getElementById('app')

  app.innerHTML = `
    <h1>Checklistings</h1>

    ${categories.map(c=>`
      <div class="card" onclick="openCategory('${c.id}')">
        ${c.icon} ${c.title}
      </div>
    `).join('')}
  `
}

/* ---------- CATEGORY ---------- */

async function openCategory(id){
  currentCategory = categories.find(c=>c.id===id)

  const res = await fetch(`./data/${id}/index.json?v=`+Date.now())
  const files = await res.json()

  const checklists = await Promise.all(
    files.map(f=>fetch(`./data/${id}/${f}`).then(r=>r.json()))
  )

  currentCategory.checklists = checklists

  renderCategory()
}

function renderCategory(){
  const app = document.getElementById('app')

  app.innerHTML = `
    <button onclick="renderCategories()">← Назад</button>
    <h2>${currentCategory.title}</h2>

    ${currentCategory.checklists.map(cl=>`
      <div class="card" onclick="openChecklist('${cl.id}')">
        <b>${cl.title}</b><br>
        <small>${cl.subtitle}</small><br>
        <span class="status ${localStorage.getItem(cl.id)==='done'?'done':'progress'}">
          ${localStorage.getItem(cl.id)==='done'?'Выполнено':'В процессе'}
        </span>
      </div>
    `).join('')}
  `
}

/* ---------- CHECKLIST ---------- */

function openChecklist(id){
  currentChecklist = currentCategory.checklists.find(c=>c.id===id)
  renderChecklist()
}

function renderChecklist(){
  const c = currentChecklist
  const app = document.getElementById('app')

  app.innerHTML = `
    <button onclick="renderCategory()">← Назад</button>

    <div class="card">
      <h2>${c.title}</h2>
      <div>${c.subtitle}</div>
      <p>${c.description}</p>
    </div>

    ${c.items.map(i=>`
      <details>
        <summary>${i.emoji} ${i.title}</summary>
        <div class="content">
          <div class="source">${i.source}</div>
          <div>${i.text}</div>
          <div class="tip"><b>Совет:</b> ${i.tip}</div>
        </div>
      </details>
    `).join('')}

    <button onclick="finishChecklist()">Завершить</button>
  `
}

/* ---------- LOGIC ---------- */

function finishChecklist(){
  localStorage.setItem(currentChecklist.id,'done')
  renderCategory()
}

/* ---------- START ---------- */

loadCategories()

</script>
</body>
</html>

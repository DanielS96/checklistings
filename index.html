<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checklistings</title>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#f2f2f7;
}

#app {
  max-width:720px;
  margin:auto;
  padding:16px;
}

/* HEADER */
.header {
  margin-bottom:20px;
}

/* PROGRESS */
.progress-card {
  background:white;
  padding:16px;
  border-radius:16px;
  margin-bottom:16px;
}

.progress-bar {
  height:10px;
  background:#eee;
  border-radius:10px;
  overflow:hidden;
}

.progress-fill {
  height:100%;
  background:#34c759;
  width:0%;
}

/* CATEGORY */
.category {
  background:white;
  padding:16px;
  border-radius:16px;
  margin-bottom:12px;
  cursor:pointer;
}

.category-title {
  font-weight:700;
}

.category-desc {
  color:#666;
  font-size:14px;
}

/* CHECKLIST */
.card {
  background:white;
  padding:16px;
  border-radius:16px;
  margin-bottom:12px;
}

.item {
  border-top:1px solid #eee;
  padding:12px 0;
}

.item-header {
  font-weight:600;
  cursor:pointer;
}

.item-body {
  display:none;
  margin-top:8px;
}

.tip {
  background:#e8f0ff;
  padding:8px;
  border-radius:8px;
  margin-top:6px;
}

/* BUTTON */
button {
  background:#007aff;
  color:white;
  border:none;
  padding:12px;
  border-radius:10px;
  width:100%;
  margin-top:10px;
}

.back {
  background:none;
  color:#007aff;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div id="app"></div>

<script type="module">

import { loadCategories, loadChecklists } from './js/api.js'

let state = {
  screen: 'categories',
  category: null,
  checklists: [],
  current: null
}

// STORAGE
const getProgress = () => JSON.parse(localStorage.getItem('progress') || '{}')

const setDone = (id)=>{
  const p = getProgress()
  p[id] = true
  localStorage.setItem('progress', JSON.stringify(p))
}

// ===== RENDER =====

async function renderCategories(){
  const categories = await loadCategories()
  const progress = getProgress()

  const total = Object.keys(progress).length

  document.getElementById('app').innerHTML = `
    <div class="header">
      <h1>Checklistings</h1>
    </div>

    <div class="progress-card">
      <b>Общий прогресс</b>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${total * 10}%"></div>
      </div>
    </div>

    ${categories.map(cat=>`
      <div class="category" onclick="openCategory('${cat.id}')">
        <div class="category-title">
          ${cat.emoji || '📁'} ${cat.title}
        </div>
        <div class="category-desc">
          ${cat.description}
        </div>
      </div>
    `).join('')}
  `
}

window.openCategory = async (id)=>{
  state.category = id
  state.checklists = await loadChecklists(id)
  renderCategory()
}

function renderCategory(){
  document.getElementById('app').innerHTML = `
    <button class="back" onclick="renderCategories()">← Назад</button>

    ${state.checklists.map(c=>`
      <div class="card" onclick="openChecklist('${c.id}')">
        <b>${c.title}</b>
        <div>${c.subtitle}</div>
      </div>
    `).join('')}
  `
}

window.openChecklist = (id)=>{
  state.current = state.checklists.find(c=>c.id===id)
  renderChecklist()
}

function renderChecklist(){
  const c = state.current

  document.getElementById('app').innerHTML = `
    <button class="back" onclick="renderCategory()">← Назад</button>

    <h1>${c.title}</h1>
    <p>${c.subtitle}</p>

    <div class="card">${c.description}</div>

    ${c.items.map((item,i)=>`
      <div class="item">
        <div class="item-header" onclick="toggle(${i})">
          ${item.emoji} ${item.title}
        </div>
        <div class="item-body" id="i${i}">
          <p>${item.text}</p>
          <div class="tip">${item.tip}</div>
        </div>
      </div>
    `).join('')}

    ${renderQuiz(c)}
  `
}

window.toggle = (i)=>{
  const el = document.getElementById('i'+i)
  el.style.display = el.style.display==='block'?'none':'block'
}

// QUIZ
function renderQuiz(c){
  if(!c.quiz) return ''

  return `
    <h3>Тест</h3>

    ${c.quiz.map((q,i)=>`
      <div>
        <p>${q.q}</p>
        ${q.a.map((a,j)=>`
          <label>
            <input type="radio" name="q${i}" value="${j}">
            ${a}
          </label><br>
        `).join('')}
      </div>
    `).join('')}

    <button onclick="checkQuiz()">Проверить</button>
    <div id="result"></div>
  `
}

window.checkQuiz = ()=>{
  const c = state.current
  let score = 0

  c.quiz.forEach((q,i)=>{
    const v = document.querySelector(`input[name="q${i}"]:checked`)
    if(v && Number(v.value)===q.correct) score++
  })

  document.getElementById('result').innerHTML = `
    Результат: ${score}/${c.quiz.length}
    <button onclick="finish('${c.id}')">Завершить</button>
  `
}

window.finish = (id)=>{
  setDone(id)
  renderCategories()
}

// INIT
renderCategories()

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checklistings</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f8fafc;
  --card:#ffffff;
  --accent:#3b82f6;
  --text:#0f172a;
  --sub:#64748b;
}
body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}
.app{max-width:420px;margin:0 auto;padding:16px}
h1{font-size:26px;margin:10px 0}
.bar{height:8px;background:#e2e8f0;border-radius:999px;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,#3b82f6,#6366f1);width:0%;transition:0.5s}
.card{background:var(--card);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 4px 20px rgba(0,0,0,0.05);cursor:pointer;transition:0.25s}
.card:active{transform:scale(0.97)}
.title{font-weight:600}
.sub{font-size:13px;color:var(--sub)}
.status{font-size:12px;padding:4px 8px;border-radius:999px}
.done{background:#dcfce7;color:#166534}
.progress{background:#e0f2fe;color:#075985}
.screen{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);transform:translateX(100%);transition:0.35s ease;padding:20px;overflow:auto}
.screen.active{transform:translateX(0)}
.back{margin-bottom:10px;color:var(--accent);cursor:pointer}
.row{display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>
<div class="app">
<h1>Checklistings</h1>
<div class="sub">Общий прогресс</div>
<div class="bar"><div id="globalFill" class="fill"></div></div>
<div id="cats"></div>
</div>

<div id="screen" class="screen"></div>

<script>
const data=[
  {name:"Отношения",lists:[
    {title:"Идеальное свидание",completed:false},
    {title:"Флирт",completed:true}
  ]},
  {name:"Финансы",lists:[
    {title:"Бюджет",completed:false},
    {title:"Инвестиции",completed:false}
  ]}
];

let xp=0;
let level=1;

function save(){localStorage.setItem('app',JSON.stringify({data,xp,level}))}
function load(){
  const d=localStorage.getItem('app');
  if(d){
    const parsed=JSON.parse(d);
    Object.assign(data,parsed.data);
    xp=parsed.xp; level=parsed.level;
  }
}

function calcGlobal(){
  let total=0,done=0;
  data.forEach(c=>{
    c.lists.forEach(l=>{total++; if(l.completed) done++})
  });
  return Math.round((done/total)*100)||0;
}

function render(){
  const root=document.getElementById('cats');
  root.innerHTML='';

  document.getElementById('globalFill').style.width=calcGlobal()+'%';

  const xpNeeded=level*100;

  const xpBlock=document.createElement('div');
  xpBlock.className='card';
  xpBlock.innerHTML=`
    <div class='title'>Уровень ${level}</div>
    <div class='sub'>XP: ${xp}/${xpNeeded}</div>
    <div class='bar'><div class='fill' style='width:${(xp/xpNeeded)*100}%'></div></div>
  `;
  root.appendChild(xpBlock);

  data.forEach((cat,i)=>{
    const done=cat.lists.filter(l=>l.completed).length;
    const total=cat.lists.length;
    const p=Math.round((done/total)*100)||0;

    const el=document.createElement('div');
    el.className='card';
    el.innerHTML=`
      <div class='title'>${cat.name}</div>
      <div class='sub'>${p}% завершено</div>
      <div class='bar'><div class='fill' style='width:${p}%'></div></div>
    `;
    el.onclick=()=>openCategory(i);
    root.appendChild(el);
  });
}

function openCategory(i){
  const screen=document.getElementById('screen');
  const cat=data[i];

  screen.innerHTML=`<div class='back' onclick='closeScreen()'>← Назад</div><h2>${cat.name}</h2>`;

  cat.lists.forEach((l,li)=>{
    const el=document.createElement('div');
    el.className='card';
    el.innerHTML=`
      <div class='row'>
        <div class='title'>${l.title}</div>
        <div class='status ${l.completed?'done':'progress'}'>${l.completed?'Выполнено':'Не завершён'}</div>
      </div>
    `;
    el.onclick=()=>openChecklist(i,li);
    screen.appendChild(el);
  });

  screen.classList.add('active');
}

function openChecklist(i,li){
  const screen=document.getElementById('screen');
  const item=data[i].lists[li];

  screen.innerHTML=`
    <div class='back' onclick='openCategory(${i})'>← Назад</div>
    <h2>${item.title}</h2>
    <div class='card'>
      <div class='title'>Демо чек-лист</div>
      <div class='sub'>Здесь будет твой контент (как HTML чек-лист)</div>
      <button class='btn' onclick='complete(${i},${li})'>Завершить тест</button>
    </div>
  `;
}

function complete(i,li){
  const item=data[i].lists[li];
  if(!item.completed){
    item.completed=true;
    xp+=20;
    if(xp>=level*100){xp=0; level++}
    save();
  }
  openCategory(i);
  render();
}

function closeScreen(){
  document.getElementById('screen').classList.remove('active');
}

load();
render();
</script>
</body>
</html>

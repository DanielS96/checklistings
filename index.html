<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklistings</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
#app{max-width:700px;margin:0 auto;padding:20px}

.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
}
</style>
</head>

<body>
<div id="app">Загрузка...</div>

<script>
let DATA = null
let screen = 'categories'
let currentCategory = null
let currentChecklist = null

async function init(){
  try{
    const res = await fetch('./data.json?v=' + Date.now())
    if(!res.ok) throw new Error('data.json не найден')
    DATA = await res.json()
    render()
  }catch(e){
    document.getElementById('app').innerHTML = '❌ Ошибка загрузки data.json'
    console.error(e)
  }
}

function render(){
  if(screen==='categories') renderCategories()
  if(screen==='category') renderCategory()
  if(screen==='checklist') renderChecklist()
}

/* ---------- ГЛАВНЫЙ ---------- */

function renderCategories(){
  const app = document.getElementById('app')

  app.innerHTML = `
    <h1>Checklistings</h1>

    ${DATA.categories.map(c=>`
      <div class="card" onclick="openCategory('${c.id}')">
        ${c.icon} ${c.title}
      </div>
    `).join('')}
  `
}

/* ---------- КАТЕГОРИЯ ---------- */

function openCategory(id){
  currentCategory = DATA.categories.find(c=>c.id===id)
  screen='category'
  render()
}

function renderCategory(){
  const app = document.getElementById('app')

  app.innerHTML = `
    <button onclick="back()">← Назад</button>
    <h2>${currentCategory.title}</h2>

    ${currentCategory.checklists.map(cl=>`
      <div class="card" onclick="openChecklist('${cl.id}')">
        ${cl.title}
      </div>
    `).join('')}
  `
}

/* ---------- ЧЕК-ЛИСТ ---------- */

function openChecklist(id){
  currentChecklist = currentCategory.checklists.find(c=>c.id===id)
  screen='checklist'
  render()
}

function renderChecklist(){
  const c = currentChecklist
  const app = document.getElementById('app')

  app.innerHTML = `
    <button onclick="back()">← Назад</button>

    <h2>${c.title}</h2>
    <p>${c.description}</p>

    ${c.items.map(i=>`
      <details>
        <summary>${i.emoji} ${i.title}</summary>
        <div>${i.text}</div>
        <div><b>${i.tip}</b></div>
      </details>
    `).join('')}

    <button onclick="finishChecklist()">Завершить</button>
  `
}

/* ---------- ЛОГИКА ---------- */

function finishChecklist(){
  localStorage.setItem(currentChecklist.id,'done')
  alert('Готово')
}

function back(){
  if(screen==='checklist') screen='category'
  else if(screen==='category') screen='categories'
  render()
}

init()
</script>
</body>
</html>

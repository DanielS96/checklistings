<div id="app"></div>

<script>
let DATA = null
let currentCategory = null
let currentChecklist = null

async function load(){
  const res = await fetch('./data.json?v=' + Date.now())
  DATA = await res.json()
  renderCategories()
}

function getChecklistStatus(id){
  return localStorage.getItem(id)
}

function setChecklistDone(id){
  localStorage.setItem(id, 'done')
}

function getProgress(){
  let total = 0
  let done = 0

  DATA.categories.forEach(cat=>{
    cat.checklists.forEach(cl=>{
      total++
      if(getChecklistStatus(cl.id)==='done') done++
    })
  })

  return total ? Math.round(done/total*100) : 0
}

function renderCategories(){
  const app = document.getElementById('app')

  app.innerHTML = `
    <h1>Checklistings</h1>
    <p>Общий прогресс: ${getProgress()}%</p>

    ${DATA.categories.map(cat=>`
      <div onclick="openCategory('${cat.id}')">
        ${cat.icon} ${cat.title}
      </div>
    `).join('')}
  `
}

function openCategory(id){
  currentCategory = DATA.categories.find(c=>c.id===id)
  renderCategory()
}

function renderCategory(){
  const app = document.getElementById('app')

  app.innerHTML = `
    <button onclick="renderCategories()">← Назад</button>
    <h2>${currentCategory.title}</h2>

    ${currentCategory.checklists.map(cl=>`
      <div onclick="openChecklist('${cl.id}')">
        ${cl.title} — ${getChecklistStatus(cl.id)==='done' ? '✅' : '⏳'}
      </div>
    `).join('')}
  `
}

function openChecklist(id){
  currentChecklist = currentCategory.checklists.find(c=>c.id===id)
  renderChecklist()
}

function renderChecklist(){
  const cl = currentChecklist
  const app = document.getElementById('app')

  app.innerHTML = `
    <button onclick="renderCategory()">← Назад</button>

    <h2>${cl.title}</h2>
    <p>${cl.description}</p>

    ${cl.items.map(i=>`
      <details>
        <summary>${i.emoji} ${i.title}</summary>
        <div>${i.text}</div>
        <div>${i.tip}</div>
      </details>
    `).join('')}

    <button onclick="finishChecklist()">Завершить</button>
  `
}

function finishChecklist(){
  setChecklistDone(currentChecklist.id)
  renderCategory()
}

load()
</script>

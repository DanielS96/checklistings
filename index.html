<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Checklistings App</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f8fafc;
  --card:#ffffff;
  --accent:#3b82f6;
  --sub:#64748b;
}

body{margin:0;font-family:Inter;background:var(--bg);}
.app{max-width:420px;margin:0 auto;padding:16px;}

.bar{height:10px;background:#e2e8f0;border-radius:999px;}
.fill{height:100%;background:linear-gradient(90deg,#3b82f6,#6366f1);}

.card{
  background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;
  box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.row{display:flex;justify-content:space-between;align-items:center;}
.sub{font-size:13px;color:var(--sub);}

.status{font-size:12px;padding:6px 10px;border-radius:999px;}
.done{background:#dcfce7;color:#166534}
.progress{background:#e0f2fe;color:#075985}
.new{background:#ede9fe;color:#5b21b6}

.screen{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:#f8fafc;transform:translateX(100%);
  transition:.3s;padding:16px;overflow:auto;
}
.screen.active{transform:translateX(0);}

.content details{
  background:#fff;padding:14px;border-radius:12px;margin-bottom:10px;
}

.bottom-btn{
  margin-top:20px;width:100%;padding:14px;
  background:#3b82f6;color:#fff;border:none;border-radius:12px;
}
</style>
</head>

<body>

<div class="app">
  <h2>Checklistings App</h2>
  <div id="globalText"></div>
  <div class="bar"><div id="globalFill" class="fill"></div></div>
  <div id="cats"></div>
</div>

<div id="screen" class="screen"></div>

<script>
let data=[];

function save(){localStorage.setItem('app',JSON.stringify(data));}

function load(){
  let d=localStorage.getItem('app');
  if(!d)return;
  let p=JSON.parse(d);
  p.forEach((c,i)=>{
    c.lists.forEach((l,li)=>{
      data[i].lists[li].completed=l.completed;
      data[i].lists[li].started=l.started;
    });
  });
}

function build(items){
  let map={};
  items.forEach(it=>{
    if(!map[it.category]){
      map[it.category]={name:it.category,lists:[]};
    }
    map[it.category].lists.push({
      title:it.title,
      file:it.file,
      completed:false,
      started:false
    });
  });
  return Object.values(map);
}

function progress(cat){
  let t=cat.lists.length;
  let d=cat.lists.filter(x=>x.completed).length;
  return t?Math.round(d/t*100):0;
}

function globalProgress(){
  let t=0,d=0;
  data.forEach(c=>c.lists.forEach(l=>{t++;if(l.completed)d++;}));
  return t?Math.round(d/t*100):0;
}

function render(){
  let root=document.getElementById('cats');
  root.innerHTML='';

  let g=globalProgress();
  globalFill.style.width=g+'%';
  globalText.innerText='Общий прогресс: '+g+'%';

  data.forEach((cat,i)=>{
    let el=document.createElement('div');
    el.className='card';

    let p=progress(cat);

    el.innerHTML=`
      <b>${cat.name}</b>
      <div class='sub'>${p}% завершено</div>
      <div class='bar'><div class='fill' style='width:${p}%'></div></div>
    `;

    el.onclick=()=>openCategory(i);
    root.appendChild(el);
  });
}

function openCategory(i){
  let s=document.getElementById('screen');
  let cat=data[i];

  s.innerHTML=`<div onclick="closeScreen()">← Назад</div><h3>${cat.name}</h3>`;

  cat.lists.forEach((l,li)=>{
    let el=document.createElement('div');
    el.className='card';

    let st='new',tx='Новый';
    if(l.completed){st='done';tx='Выполнено';}
    else if(l.started){st='progress';tx='Не завершён';}

    el.innerHTML=`
      <div class='row'>
        <div>${l.title}</div>
        <div class='status ${st}'>${tx}</div>
      </div>
    `;

    el.onclick=()=>openChecklist(i,li);
    s.appendChild(el);
  });

  s.classList.add('active');
}

function openChecklist(i,li){
  let s=document.getElementById('screen');
  let item=data[i].lists[li];

  item.started=true;
  save();

  fetch(item.file)
  .then(r=>r.text())
  .then(html=>{
    s.innerHTML=`<div onclick="openCategory(${i})">← Назад</div><div id="content"></div>`;

    let c=document.getElementById('content');
    c.innerHTML=html;

    // запускаем скрипты
    c.querySelectorAll("script").forEach(old=>{
      let scr=document.createElement("script");
      scr.textContent=old.textContent;
      document.body.appendChild(scr);
    });

    // ловим кнопку теста
    setTimeout(()=>{
      let btn=document.querySelector("button");
      if(btn){
        btn.onclick=()=>{
          item.completed=true;
          save();
          render();

          let back=document.createElement("button");
          back.className="bottom-btn";
          back.innerText="Назад";
          back.onclick=()=>openCategory(i);

          c.appendChild(back);
        };
      }
    },300);
  });
}

function closeScreen(){
  document.getElementById('screen').classList.remove('active');
}

fetch('checklists/index.json')
.then(r=>r.json())
.then(items=>{
  data=build(items);
  load();
  render();
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklistings App</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Inter',sans-serif;
  margin:0;
  background:#f4f5f7;
}

.container{
  max-width:720px;
  margin:0 auto;
  padding:20px;
  animation:fade 0.3s ease;
}

/* ANIMATION */
@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* PROGRESS */
.progress-box{
  background:#fff;
  padding:16px;
  border-radius:16px;
  margin:15px 0;
}

.progress-top{
  display:flex;
  justify-content:space-between;
}

.progress-bar{
  height:10px;
  background:#e5e7eb;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.progress-bar div{
  height:100%;
  background:#6366f1;
}

/* CATEGORY */
.category{
  background:#fff;
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
  cursor:pointer;
  transition:0.2s;
}

.category:hover{
  transform:translateY(-2px);
}

.sub{
  font-size:13px;
  color:#6b7280;
}

/* STATUS */
.status{
  margin-top:6px;
  font-size:12px;
}

.new{color:#2563eb}
.progress{color:#d97706}
.done{color:#16a34a}

/* CHECKLIST ITEM */
.item{
  background:#fff;
  border-radius:14px;
  padding:14px;
  margin-bottom:10px;
  cursor:pointer;
  transition:0.2s;
}

.item:hover{
  transform:scale(1.01);
}

.item-top{
  display:flex;
  justify-content:space-between;
}

.arrow{
  transition:0.2s;
}

.open .arrow{
  transform:rotate(90deg);
}

.content{
  margin-top:10px;
  color:#444;
}

.tip{
  margin-top:10px;
  padding:10px;
  background:#eef2ff;
  border-radius:10px;
}

/* QUIZ */
.question{
  background:#fff;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
}

.answers div{
  background:#f1f5f9;
  padding:12px;
  border-radius:10px;
  margin-top:6px;
  cursor:pointer;
}

.answers .selected{background:#dbeafe}
.answers .correct{background:#dcfce7}
.answers .wrong{background:#fee2e2}

button{
  width:100%;
  padding:12px;
  background:#6366f1;
  color:#fff;
  border:none;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>
let data=[];
let state=JSON.parse(localStorage.getItem("progress"))||{};

const catInfo={
"🏠 Дом и быт":"порядок, комфорт",
"💰 Финансы":"деньги, контроль",
"🧠 Саморазвитие":"рост, навыки",
"💪 Здоровье":"энергия, тело",
"❤️ Отношения":"связи",
"⚡ Продуктивность":"эффективность",
"📈 Карьера":"рост",
"🧘 Ментальное состояние":"спокойствие",
"🌍 Социальная жизнь":"окружение",
"📚 Книги":"знания"
};

fetch("index.json")
.then(r=>r.json())
.then(j=>{data=j;renderHome();});

function save(){
  localStorage.setItem("progress",JSON.stringify(state));
}

/* LEVEL */
function getLevel(p){return Math.floor(p/10)+1}

/* HOME */
function renderHome(){
  const p=getTotalProgress();

  app.innerHTML=`
    <div class="header">
      <h1>Checklistings App</h1>
      <div onclick="location.reload()">⟳</div>
    </div>

    <div class="progress-box">
      <div class="progress-top">
        <b>Общий прогресс</b>
        <span>Level ${getLevel(p)}</span>
      </div>
      <div class="progress-bar"><div style="width:${p}%"></div></div>
      <div>${p}%</div>
    </div>

    ${[...new Set(data.map(i=>i.category))].map(cat=>{
      const prog=getCategoryProgress(cat);
      return `
        <div class="category" onclick="openCategory('${cat}')">
          <b>${cat}</b>
          <div class="sub">${catInfo[cat]}</div>
          <div class="progress-bar"><div style="width:${prog}%"></div></div>
        </div>
      `;
    }).join("")}
  `;
}

/* CATEGORY */
function openCategory(cat){
  const list=data.filter(i=>i.category===cat);

  app.innerHTML=`
    <button onclick="renderHome()">← Назад</button>
    <h1>${cat}</h1>

    ${list.map(item=>{
      const s=getStatus(item.id);
      return `
        <div class="category" onclick="openChecklist('${item.id}')">
          <b>${item.title}</b>
          <div>${item.description}</div>
          <div class="status ${s.class}">${s.text}</div>
        </div>
      `;
    }).join("")}
  `;
}

/* STATUS */
function getStatus(id){
  if(!state[id]) return {text:"🔵 новый",class:"new"};
  const p=getProgress(id);
  if(p===100) return {text:"🟢 выполнено",class:"done"};
  return {text:"🟡 не завершен",class:"progress"};
}

/* CHECKLIST */
function openChecklist(id){
  const item=data.find(i=>i.id===id);
  if(!state[id]) state[id]={checked:{},quizScore:0};

  app.innerHTML=`
    <button onclick="openCategory('${item.category}')">← Назад</button>
    <h1>${item.title}</h1>

    ${item.checklist.map((c,i)=>`
      <div class="item" onclick="toggleItem('${id}',${i},this)">
        <div class="item-top">
          <span>✨ ${c.title}</span>
          <span class="arrow">▶</span>
        </div>
        <div class="content" style="display:none">
          ${c.text}
          <div class="tip"><b>Совет:</b> ${c.tip}</div>
        </div>
      </div>
    `).join("")}

    <h3>Тест</h3>
    <div id="quiz"></div>
    <button onclick="checkQuiz('${id}')">Проверить</button>
    <div id="result"></div>
  `;

  const quiz=document.getElementById("quiz");

  item.quiz.forEach((q,i)=>{
    quiz.innerHTML+=`
      <div class="question">
        ${i+1}. ${q.q}
        <div class="answers">
          ${q.a.map((a,ai)=>`
            <div onclick="selectAnswer(${i},${ai})" id="q${i}a${ai}">${a}</div>
          `).join("")}
        </div>
      </div>
    `;
  });

  window.currentQuiz=item.quiz;
}

/* ITEM TOGGLE */
function toggleItem(id,i,el){
  const content=el.querySelector(".content");
  const open=content.style.display==="block";

  content.style.display=open?"none":"block";
  el.classList.toggle("open");

  state[id].checked[i]=!open;
  save();
}

/* QUIZ */
function selectAnswer(q,a){
  document.querySelectorAll(`#q${q}a0,#q${q}a1`)
    .forEach(el=>el.classList.remove("selected"));

  document.getElementById(`q${q}a${a}`).classList.add("selected");
}

function checkQuiz(id){
  let score=0;

  currentQuiz.forEach((q,i)=>{
    const selected=document.querySelector(`#q${i}a0.selected,#q${i}a1.selected`);

    q.a.forEach((_,ai)=>{
      const el=document.getElementById(`q${i}a${ai}`);

      if(ai===q.c) el.classList.add("correct");
      if(selected && selected.id===`q${i}a${ai}` && ai!==q.c) el.classList.add("wrong");
    });

    if(selected && selected.id===`q${i}a${q.c}`) score++;
  });

  state[id].quizScore=score;
  save();

  document.getElementById("result").innerText=`Результат: ${score}/${currentQuiz.length}`;
}

/* PROGRESS */
function getProgress(id){
  const item=data.find(i=>i.id===id);
  if(!state[id]) return 0;

  const checked=Object.values(state[id].checked).filter(v=>v).length;
  const cProg=checked/item.checklist.length;
  const qProg=state[id].quizScore/item.quiz.length;

  return Math.round((cProg+qProg)/2*100);
}

function getCategoryProgress(cat){
  const list=data.filter(i=>i.category===cat);
  let total=0;
  list.forEach(i=>total+=getProgress(i.id));
  return Math.round(total/list.length);
}

function getTotalProgress(){
  let total=0;
  data.forEach(i=>total+=getProgress(i.id));
  return Math.round(total/data.length);
}
</script>

</body>
</html>

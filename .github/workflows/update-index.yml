name: Update index.json

on:
  push:
    paths:
      - 'data/**.json'

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate index files
        run: |
          for dir in data/*/ ; do
            if [ -d "$dir" ]; then
              files=$(ls "$dir"*.json 2>/dev/null | grep -v index.json | xargs -n 1 basename)
              if [ ! -z "$files" ]; then
                printf "[\n" > "$dir/index.json"
                first=true
                for file in $files; do
                  if [ "$first" = true ]; then
                    printf "  \"%s\"" "$file" >> "$dir/index.json"
                    first=false
                  else
                    printf ",\n  \"%s\"" "$file" >> "$dir/index.json"
                  fi
                done
                printf "\n]\n" >> "$dir/index.json"
              fi
            fi
          done

      - name: Commit changes
        run: |
          git config user.name \"github-actions\"
          git config user.email \"actions@github.com\"
          git add data/*/index.json
          git commit -m \"auto-update index.json\" || echo \"No changes\"
          git push
